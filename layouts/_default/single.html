{{ define "main" }}
<article>
  <header class="post-header">
    <h1>{{ .Title }}</h1>
    <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
  </header>

  <div class="post-content">
    {{ .Content }}
  </div>

  {{ with .Params.tags }}
    <footer class="post-tags">
      <ul>
        {{ range . }}<li>{{ . }}</li>{{ end }}
      </ul>
    </footer>
  {{ end }}
</article>
{{ end }}
