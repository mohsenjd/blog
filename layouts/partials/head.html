<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>

{{- $description := cond (ne .Description "") .Description .Site.Params.description }}
<meta name="description" content="{{ $description }}">

{{ if not .IsHome }}<link rel="canonical" href="{{ .Permalink }}">{{ end }}

<meta property="og:title"       content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}{{ end }}">
<meta property="og:description" content="{{ $description }}">
<meta property="og:url"         content="{{ .Permalink }}">
<meta property="og:type"        content="{{ if .IsPage }}article{{ else }}website{{ end }}">

{{ with .OutputFormats.Get "rss" -}}
  <link rel="alternate" type="application/rss+xml" href="{{ .Permalink }}" title="{{ $.Site.Title }}">
{{- end }}

{{- $css := resources.Get "css/main.css" | minify | fingerprint }}
<link rel="stylesheet" href="{{ $css.Permalink }}" integrity="{{ $css.Data.Integrity }}" crossorigin="anonymous">
